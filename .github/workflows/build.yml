name: Build Windows Executable

on:
  push:
    branches:
      - main
      - codex/frontend-operator-ui-readiness
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Custom version
        required: false
        default: ''

env:
  APP_NAME: SentinelEcho
  VERSION: ${{ github.event.inputs.version || '1.0.0-beta' }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = "${{ github.ref }}" -replace 'refs/tags/v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r backend\requirements.txt
          python -m pip install pyinstaller

      - name: Run static tests
        run: python -m pytest backend/tests/test_windows_installer_bootstrap_static.py -q

      - name: Build frontend
        working-directory: frontend
        run: |
          Remove-Item dist -Recurse -Force -ErrorAction SilentlyContinue
          npm install
          npx expo export --platform web

      - name: Build Windows Executable
        run: |
          Remove-Item build -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "dist\SentinelEcho" -Recurse -Force -ErrorAction SilentlyContinue
          python -m PyInstaller `
            --clean `
            --name SentinelEcho `
            --onedir `
            --console `
            --paths backend `
            --add-data "frontend\dist;static" `
            --hidden-import uvicorn `
            --hidden-import fastapi `
            --hidden-import aiosqlite `
            --hidden-import pymongo `
            --hidden-import motor `
            --hidden-import discord `
            --hidden-import jwt `
            --hidden-import jose `
            --hidden-import dotenv `
            --hidden-import email_validator `
            --hidden-import multipart `
            --hidden-import passlib.handlers.bcrypt `
            --hidden-import robin_stocks `
            --collect-all discord `
            --collect-all robin_stocks `
            --noconfirm `
            windows_entrypoint.py

      - name: Copy launchers into package
        run: |
          $package = "dist\SentinelEcho"
          Copy-Item "Launch-Sentinel-Echo.bat" -Destination $package -Force
          Copy-Item "Launch-Sentinel-Echo.ps1" -Destination $package -Force
          Copy-Item ".env.example" -Destination $package -Force -ErrorAction SilentlyContinue

      - name: Verify package
        run: |
          if (!(Test-Path "dist\SentinelEcho\SentinelEcho.exe")) {
            Write-Host "ERROR: SentinelEcho.exe not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelEcho\_internal\static\index.html") -and !(Test-Path "dist\SentinelEcho\static\index.html")) {
            Write-Host "ERROR: packaged static index.html not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelEcho\Launch-Sentinel-Echo.bat")) {
            Write-Host "ERROR: Launch-Sentinel-Echo.bat not found"
            exit 1
          }
          if (!(Test-Path "dist\SentinelEcho\Launch-Sentinel-Echo.ps1")) {
            Write-Host "ERROR: Launch-Sentinel-Echo.ps1 not found"
            exit 1
          }

      - name: Create Inno Setup script
        run: |
          $iss = @"
          #define MyAppName "Sentinel Echo"
          #define MyAppVersion "${{ env.VERSION }}"
          #define MyAppPublisher "Tetradim / SignalForge Lab"
          #define MyAppURL "https://github.com/Tetradim/Sentinel-Echo"
          #define MyAppExeName "SentinelEcho.exe"

          [Setup]
          AppId={{EB01EBE2-AD63-4972-9C14-043C52B66430}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppVerName={#MyAppName} {#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          AppPublisherURL={#MyAppURL}
          AppSupportURL={#MyAppURL}/issues
          AppUpdatesURL={#MyAppURL}/releases
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=installer-dist
          OutputBaseFilename=SentinelEcho-Setup-{#MyAppVersion}
          UninstallDisplayName={#MyAppName}
          UninstallDisplayIcon={app}\{#MyAppExeName}
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          MinVersion=10.0.18362
          PrivilegesRequired=admin
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce
          Name: "launchapp"; Description: "Launch Sentinel Echo after install"; GroupDescription: "Startup"; Flags: checkedonce

          [Files]
          Source: "dist\SentinelEcho\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\Launch-Sentinel-Echo.bat"; WorkingDir: "{app}"
          Name: "{group}\Uninstall {#MyAppName}"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\{#MyAppName}"; Filename: "{app}\Launch-Sentinel-Echo.bat"; WorkingDir: "{app}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Launch-Sentinel-Echo.bat"; Description: "Launch {#MyAppName}"; Flags: nowait postinstall skipifsilent shellexec; Tasks: launchapp; WorkingDir: "{app}"

          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"
          Type: files; Name: "{userdesktop}\Sentinel-Echo.log"
          Type: files; Name: "{userdesktop}\Sentinel-Echo-Transcript.log"

          [Code]
          procedure CurUninstallStepChanged(CurUninstallStep: TUninstallStep);
          var
            ResultCode: Integer;
          begin
            if CurUninstallStep = usUninstall then
            begin
              Exec('taskkill', '/F /IM SentinelEcho.exe', '', SW_HIDE, ewWaitUntilTerminated, ResultCode);
            end;
          end;
          "@
          $iss | Out-File -Encoding ASCII setup.iss

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelEcho-Setup-${{ env.VERSION }}
          path: installer-dist/SentinelEcho-Setup*.exe
          if-no-files-found: error
          retention-days: 90

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          pattern: SentinelEcho-Setup-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/SentinelEcho-Setup*.exe
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          generate_release_notes: true
