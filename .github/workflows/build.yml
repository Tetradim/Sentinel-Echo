name: Build Windows Executable

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: Consolidation
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = "${{ github.ref }}" -replace 'refs/tags/v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend (Web/Expo)
        working-directory: ./frontend
        run: npx expo export --platform web

      - name: Create directories
        run: |
          New-Item -ItemType Directory -Path "release" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\frontend" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\backend" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\config" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\scripts" -Force | Out-Null

      - name: Copy frontend build
        run: Copy-Item -Path "frontend\dist\*" -Destination "release\frontend" -Recurse -Force

      - name: Create startup script
        run: |
          $start = @"
          @echo off
          title Consolidation Trading Bot
          echo.
          echo ========================================
          echo  Consolidation Trading Bot
          echo  Starting...
          echo ========================================
          echo.

          :server
          echo Starting web server on port 8080...
          python -m http.server 8080 --directory "%~dp0frontend"
          pause
          "@
          $start | Out-File -FilePath "release\start.bat" -Encoding ASCII

      - name: Create Python server script
        run: |
          $server = @"
          import http.server
          import socketserver
          import threading
          import os

          PORT = 8080
          DIRECTORY = os.path.dirname(os.path.abspath(__file__))
          DIRECTORY = os.path.join(DIRECTORY, "frontend")

          class CustomHandler(http.server.SimpleHTTPRequestHandler):
              def __init__(self, *args, **kwargs):
                  super().__init__(*args, directory=DIRECTORY, **kwargs)

          def run_server():
              with socketserver.TCPServer(("", PORT), CustomHandler) as httpd:
                  print(f"Server running at http://localhost:{PORT}")
                  httpd.serve_forever()

          if __name__ == "__main__":
              print("Starting Consolidation Trading Bot...")
              print(f"Web UI: http://localhost:{PORT}")
              threading.Thread(target=run_server, daemon=True).start()
              input("Press Enter to stop...")
          "@
          $server | Out-File -FilePath "release\server.py" -Encoding UTF8

      - name: Copy backend files
        run: |
          if (Test-Path "backend") {
            Copy-Item -Path "backend\*" -Destination "release\backend" -Recurse -Force
          }

      - name: Create configuration
        run: |
          $config = @"
          # Consolidation Trading Bot Configuration
          # Edit these values for your setup

          # Discord Bot
          DISCORD_BOT_TOKEN=your_token_here
          DISCORD_CHANNEL_IDS=123456789

          # MongoDB (optional - uses SQLite by default)
          # MONGO_URL=mongodb://localhost:27017
          DB_NAME=tradebot

          # Redis (optional - uses in-memory by default)
          # REDIS_URL=redis://localhost:6379

          # Broker Settings
          IBKR_ACCOUNT_ID=
          ALPACA_API_KEY=
          ALPACA_API_SECRET=
          ALPACA_PAPER=true

          # API Keys
          OPENAI_API_KEY=
          TWELVE_DATA_API_KEY=

          # Server
          API_PORT=8000
          API_HOST=0.0.0.0

          # Logging
          LOG_LEVEL=INFO
          "@
          $config | Out-File -FilePath "release\.env.example" -Encoding UTF8

      - name: Create portable package
        run: |
          $setup = @"
          @echo off
          setlocal enabledelayedexpansion

          set "APP_NAME=Consolidation"
          set "VERSION=${{ env.VERSION }}"
          set "INSTALL_DIR=%ProgramFiles%\%APP_NAME%"

          echo ========================================
          echo  Consolidation Trading Bot
          echo  Version: %VERSION%
          echo ========================================
          echo.

          if not "%1"=="quiet" (
            echo Installing to: %INSTALL_DIR%
            echo.
            set /p CONFIRM="Continue? (Y/N): "
            if /i not "!CONFIRM!"=="Y" exit /b 1
          )

          echo Creating directories...
          if not exist "%INSTALL_DIR%" mkdir "%INSTALL_DIR%"

          echo Copying files...
          xcopy /E /Y /Q "%~dp0release\*" "%INSTALL_DIR%\"
          xcopy /E /Y /Q "%~dp0*.example" "%INSTALL_DIR%\"

          echo.
          echo ========================================
          echo  Installation Complete!
          echo ========================================
          echo.
          echo To run the bot:
          echo   1. Copy .env.example to .env
          echo   2. Edit .env with your settings
          echo   3. Run start.bat
          echo.
          pause
          "@
          $setup | Out-File -FilePath "release\setup.bat" -Encoding ASCII

      - name: Build NSIS installer (optional)
        run: |
          $makensis = Get-Command makensis -ErrorAction SilentlyContinue
          if ($makensis) {
            Write-Host "Building NSIS installer..."
          } else {
            Write-Host "NSIS not found, skipping installer"
          }
        continue-on-error: true

      - name: Create ZIP archive
        run: |
          if (Test-Path "release") {
            Compress-Archive -Path "release\*" -DestinationPath "$env:APP_NAME-v$env:VERSION-win64.zip" -Force
            Compress-Archive -Path "release" -DestinationPath "$env:APP_NAME-$env:VERSION-portable.zip" -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win64
          path: ${{ env.APP_NAME }}-*.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win64
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          generate_release_notes: true
