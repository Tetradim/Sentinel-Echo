name: Build Windows Executable

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: Consolidation
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $version = "${{ github.ref }}" -replace 'refs/tags/v', ''
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend for local backend
        working-directory: ./frontend
        env:
          EXPO_PUBLIC_BACKEND_URL: http://127.0.0.1:8003
          EXPO_PUBLIC_DEMO_MODE: 'false'
        run: npx expo export --platform web

      - name: Create release directories
        run: |
          New-Item -ItemType Directory -Path "release" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\frontend" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\backend" -Force | Out-Null
          New-Item -ItemType Directory -Path "release\data" -Force | Out-Null

      - name: Copy application files
        run: |
          Copy-Item -Path "frontend\dist\*" -Destination "release\frontend" -Recurse -Force
          Copy-Item -Path "backend\*" -Destination "release\backend" -Recurse -Force
          if (Test-Path ".env.example") {
            Copy-Item -Path ".env.example" -Destination "release\.env.example" -Force
          }

      - name: Create functional runtime launcher
        run: |
          $launcher = @'
          param(
              [int]$BackendPort = 8003,
              [int]$FrontendPort = 3003,
              [switch]$NoBrowser,
              [switch]$InstallDeps
          )

          $ErrorActionPreference = "Stop"
          $Root = if ($PSScriptRoot) { $PSScriptRoot } else { (Get-Location).Path }
          $Backend = Join-Path $Root "backend"
          $Frontend = Join-Path $Root "frontend"
          $Data = Join-Path $Root "data"
          New-Item -ItemType Directory -Path $Data -Force | Out-Null

          function Find-Python {
              foreach ($name in @("py.exe", "python3.13.exe", "python3.12.exe", "python3.11.exe", "python.exe")) {
                  $command = Get-Command $name -ErrorAction SilentlyContinue
                  if ($command) { return $command.Source }
              }
              return $null
          }

          function Wait-Healthy {
              param([string]$Url, [System.Diagnostics.Process]$Process, [int]$Seconds = 120)
              $deadline = (Get-Date).AddSeconds($Seconds)
              while ((Get-Date) -lt $deadline) {
                  if ($Process.HasExited) { return $false }
                  try {
                      $response = Invoke-WebRequest -Uri $Url -UseBasicParsing -TimeoutSec 3
                      if ($response.StatusCode -ge 200 -and $response.StatusCode -lt 300) { return $true }
                  } catch {}
                  Start-Sleep -Milliseconds 750
              }
              return $false
          }

          $VenvPython = Join-Path $Backend ".venv\Scripts\python.exe"
          if (-not (Test-Path $VenvPython)) {
              $SystemPython = Find-Python
              if (-not $SystemPython) {
                  throw "Python 3.11 or newer is required for the first launch."
              }
              & $SystemPython -m venv (Join-Path $Backend ".venv")
              $InstallDeps = $true
          }

          $RequirementsHash = (Get-FileHash (Join-Path $Backend "requirements.txt") -Algorithm SHA256).Hash
          $InstalledHashFile = Join-Path $Backend ".venv\requirements.sha256"
          $InstalledHash = if (Test-Path $InstalledHashFile) { (Get-Content $InstalledHashFile -Raw).Trim() } else { "" }
          if ($InstallDeps -or $InstalledHash -ne $RequirementsHash) {
              Write-Host "Installing/updating Echo backend dependencies..." -ForegroundColor Cyan
              & $VenvPython -m pip install --upgrade pip wheel
              if ($LASTEXITCODE -ne 0) { throw "Failed to update pip." }
              & $VenvPython -m pip install -r (Join-Path $Backend "requirements.txt")
              if ($LASTEXITCODE -ne 0) { throw "Failed to install Echo backend dependencies." }
              Set-Content -Path $InstalledHashFile -Value $RequirementsHash -Encoding ASCII
          }

          $env:HOST = "127.0.0.1"
          $env:PORT = [string]$BackendPort
          $env:USE_SQLITE = "true"
          $env:DATABASE_PATH = Join-Path $Data "consolidation.sqlite3"
          $env:RELOAD = "false"

          $BackendOut = Join-Path $Data "backend.out.log"
          $BackendErr = Join-Path $Data "backend.err.log"
          $FrontendOut = Join-Path $Data "frontend.out.log"
          $FrontendErr = Join-Path $Data "frontend.err.log"

          $BackendProcess = Start-Process -FilePath $VenvPython `
              -ArgumentList @("-m", "backend.run") `
              -WorkingDirectory $Root `
              -RedirectStandardOutput $BackendOut `
              -RedirectStandardError $BackendErr `
              -PassThru -WindowStyle Hidden

          $FrontendProcess = $null
          try {
              if (-not (Wait-Healthy -Url "http://127.0.0.1:$BackendPort/api/health" -Process $BackendProcess)) {
                  $tail = if (Test-Path $BackendErr) { Get-Content $BackendErr -Tail 80 } else { @() }
                  throw "Echo backend failed to become healthy.`n$($tail -join [Environment]::NewLine)"
              }

              $FrontendProcess = Start-Process -FilePath $VenvPython `
                  -ArgumentList @("-m", "http.server", [string]$FrontendPort, "--bind", "127.0.0.1", "--directory", $Frontend) `
                  -WorkingDirectory $Root `
                  -RedirectStandardOutput $FrontendOut `
                  -RedirectStandardError $FrontendErr `
                  -PassThru -WindowStyle Hidden

              Start-Sleep -Seconds 1
              if ($FrontendProcess.HasExited) {
                  throw "Echo dashboard server exited during startup."
              }

              $Url = "http://127.0.0.1:$FrontendPort"
              Write-Host "Echo backend: http://127.0.0.1:$BackendPort" -ForegroundColor Green
              Write-Host "Echo dashboard: $Url" -ForegroundColor Green
              Write-Host "Close this window or press Ctrl+C to stop both services."
              if (-not $NoBrowser) { Start-Process $Url }
              Wait-Process -Id $BackendProcess.Id
          }
          finally {
              if ($FrontendProcess -and -not $FrontendProcess.HasExited) {
                  Stop-Process -Id $FrontendProcess.Id -Force -ErrorAction SilentlyContinue
              }
              if ($BackendProcess -and -not $BackendProcess.HasExited) {
                  Stop-Process -Id $BackendProcess.Id -Force -ErrorAction SilentlyContinue
              }
          }
          '@
          $launcher | Out-File -FilePath "release\Start-Consolidation.ps1" -Encoding UTF8

          $batch = @'
          @echo off
          setlocal
          title Consolidation Discord Options Bot
          cd /d "%~dp0"
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File "%~dp0Start-Consolidation.ps1" %*
          set EXITCODE=%ERRORLEVEL%
          if not "%EXITCODE%"=="0" pause
          exit /b %EXITCODE%
          '@
          $batch | Out-File -FilePath "release\Start-Consolidation.bat" -Encoding ASCII

      - name: Create configuration template
        run: |
          if (-not (Test-Path "release\.env.example")) {
            @(
              "DISCORD_BOT_TOKEN=",
              "DISCORD_CHANNEL_IDS=",
              "USE_SQLITE=true",
              "DATABASE_PATH=data/consolidation.sqlite3",
              "HOST=127.0.0.1",
              "PORT=8003"
            ) | Set-Content -Path "release\.env.example" -Encoding UTF8
          }

      - name: Validate packaged launcher contracts
        shell: pwsh
        run: |
          $launcher = Get-Content "release\Start-Consolidation.ps1" -Raw
          if ($launcher -notmatch 'backend\.run') { throw "Packaged launcher does not start the Echo backend." }
          if ($launcher -notmatch '/api/health') { throw "Packaged launcher does not verify backend health." }
          if ($launcher -notmatch 'http\.server') { throw "Packaged launcher does not serve the dashboard." }
          if (-not (Test-Path "release\backend\runtime_app.py")) { throw "Recovery-enabled runtime app missing from package." }
          if (-not (Test-Path "release\backend\fill_reconciliation_v2.py")) { throw "Broker-truth reconciler missing from package." }

      - name: Create ZIP archives
        run: |
          Compress-Archive -Path "release\*" -DestinationPath "$env:APP_NAME-v$env:VERSION-win64.zip" -Force
          Compress-Archive -Path "release" -DestinationPath "$env:APP_NAME-$env:VERSION-portable.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win64
          path: ${{ env.APP_NAME }}-*.zip
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-win64
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') }}
          generate_release_notes: true
