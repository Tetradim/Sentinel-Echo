name: Echo Live Readiness

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/live-readiness.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r backend/requirements.txt
      - name: Run fill lifecycle tests
        id: tests
        env:
          PYTHONPATH: backend
          USE_SQLITE: 'true'
        shell: bash
        run: |
          set +e
          python -m pytest \
            backend/tests/test_fill_reconciliation.py \
            backend/tests/test_fill_monitor.py \
            backend/tests/test_live_fill_truth.py \
            backend/tests/test_pre_task_order_persistence.py \
            backend/tests/test_live_submission_runtime.py \
            -q --tb=short 2>&1 | tee echo-live-readiness-tests.txt
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload compact test report
        uses: actions/upload-artifact@v4
        with:
          name: echo-live-readiness-test-report
          path: echo-live-readiness-tests.txt
          if-no-files-found: error
          retention-days: 14
      - name: Fail when tests failed
        if: steps.tests.outputs.status != '0'
        run: exit 1
