name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Build Windows Executable"]
    types: [completed]
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]') ||
      (github.event_name == 'workflow_run' &&
      github.actor == 'dependabot[bot]')
    steps:
      - name: Check PR status
        id: check-status
        uses: actions/github-script@v7
        with:
          script: |
            // Get PR number from different event types
            let prNumber;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.workflow_run && context.payload.workflow_run.pull_requests.length > 0) {
              prNumber = context.payload.workflow_run.pull_requests[0].number;
            }
            
            if (!prNumber) {
              console.log('No PR found');
              core.setOutput('mergeable', 'false');
              return;
            }
            
            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            console.log(`PR #${prNumber} state: ${pr.state}`);
            console.log(`Mergeable: ${pr.mergeable}, mergeable_state: ${pr.mergeable_state}`);
            
            // Get reviews
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const approved = reviews.filter(r => r.state === 'APPROVED').length;
            const changesRequested = reviews.filter(r => r.state === 'CHANGES_REQUESTED').length;
            
            console.log(`Approved: ${approved}, Changes requested: ${changesRequested}`);
            
            // Check if can merge
            const canMerge = pr.mergeable && pr.mergeable_state === 'clean' && approved > 0 && changesRequested === 0;
            core.setOutput('mergeable', canMerge.toString());
            core.setOutput('pr_number', prNumber);

      - name: Auto-merge PR
        if: steps.check-status.outputs.mergeable == 'true'
        id: auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.workflow_run?.pull_requests[0]?.number;
            
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
            
            console.log(`Successfully merged PR #${prNumber}`);

      - name: Comment on successful merge
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || context.payload.workflow_run?.pull_requests[0]?.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ Auto-merged by GitHub Actions after successful tests.'
            });